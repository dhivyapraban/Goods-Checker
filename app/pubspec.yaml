name: ecologiq_app
description: "EcoLogiq - Smart Logistics Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & Networking
  dio: ^5.4.3
  
  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  
  # OTP Input
  pinput: ^5.0.0
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  
  # Date Formatting
  intl: ^0.19.0
  
  # Image Caching
  cached_network_image: ^3.3.1
  
  # Loading Effects
  shimmer: ^3.0.0
  
  # URL Launcher
  url_launcher: ^6.2.5
  
  # Signature Capture
  signature: ^5.5.0
  mobile_scanner: ^5.2.3
  image_picker: ^1.2.1

  # Vision / Camera (cloud audit)
  image: ^4.3.0
  camera: ^0.11.0+2
  path_provider: ^2.1.4
  path: ^1.9.0
  
  # QR Code Generation
  qr_flutter: ^4.1.0
  
  # Payment Integration
  razorpay_flutter: ^1.3.7
  
  # Push Notifications
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1
  firebase_core: ^3.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
